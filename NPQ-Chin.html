<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>Northwick Park 頸痛問卷（NPQ）</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { font-family: "Noto Sans TC", "Microsoft JhengHei", sans-serif; background:#f5f5f5; margin:0; padding:16px; }
    .container { max-width:900px; margin:auto; background:#fff; padding:20px; border-radius:10px; box-shadow:0 2px 6px rgba(0,0,0,0.1); }
    h1 { text-align:center; margin-bottom:20px; }
    
    /* 修正焦點欄位，移除瀏覽器預設外框與混亂的排版 */
    fieldset.question { 
      margin-bottom: 20px; 
      padding: 16px; 
      border: 1px solid #ddd; 
      border-radius: 8px; 
      background: #fafafa;
      display: block;
      min-width: 0;
    }
    legend.question-title { 
      font-weight: bold; 
      font-size: 1.05rem;
      margin-bottom: 12px; 
      padding: 0 4px; 
      color: #333;
    }
    .options { 
      display: flex; 
      flex-direction: column; 
      gap: 8px; 
      width: 100%;
    }
    
    /* 最佳化點擊區域，確保整行都能輕鬆點按 */
    .option { 
      display: flex; 
      align-items: center; 
      gap: 10px; 
      padding: 12px; 
      border-radius: 6px; 
      background: #fff; 
      border: 1px solid #ccc; 
      cursor: pointer; 
      font-size: 0.95rem; 
      transition: background 0.2s;
    }
    .option:hover { background: #f0f7ff; }
    .option input { cursor: pointer; width: 18px; height: 18px; margin: 0; }
    
    /* 無障礙鍵盤焦點框 */
    .option input:focus-visible { outline: 2px solid #1976d2; }
    
    button { margin-top:20px; padding:12px 20px; border:none; border-radius:6px; background:#1976d2; color:white; font-size:1rem; cursor:pointer; font-weight:bold; }
    button:hover { background:#125a9c; }
    
    /* 彈出視窗樣式 */
    .modal { display:none; position:fixed; z-index:1000; inset:0; background:rgba(0,0,0,0.4); }
    .modal-content { background:#fff; margin:15% auto; padding:24px; border-radius:10px; width:90%; max-width:440px; text-align:center; box-shadow:0 2px 8px rgba(0,0,0,0.3); }
    .close-btn { margin-top:20px; padding:10px 16px; background:#555; color:white; border:none; border-radius:6px; cursor:pointer; }
    .close-btn:hover { background:#333; }
    
    .warning { color:#c62828; margin-top:10px; font-size:1rem; font-weight: bold; min-height: 24px; }
    .hint { font-size:0.85rem; color:#d32f2f; margin-bottom: 10px; font-weight: bold; }
    .notice-box { background: #e3f2fd; border-left: 4px solid #1976d2; padding: 12px; margin-top: 15px; text-align: left; font-size: 0.95rem; color: #0d47a1; border-radius: 4px; line-height: 1.5; }
  </style>
</head>
<body>

<div class="container">
  <h1>Northwick Park 頸痛問卷（NPQ）</h1>
  <p style="color:#555; margin-bottom:20px;">請根據您今日的情況，在每一題中選擇最貼切的描述。<strong>（若平時不駕駛，第9題可留空）</strong></p>
  
  <!-- 問卷渲染區域 -->
  <div id="questions"></div>
  
  <button type="button" onclick="calculateNPQ()">計算分數</button>
  <div id="warning" class="warning" aria-live="assertive"></div>
</div>

<!-- 結果視窗 -->
<div id="scoreModal" class="modal" role="dialog" aria-labelledby="modalTitle" aria-hidden="true">
  <div class="modal-content">
    <h2 id="modalTitle">評估結果</h2>
    <p id="rawScoreText" style="font-size:1.1rem; margin:10px 0;"></p>
    <p id="percentScoreText" style="font-size:1.4rem; color:#c62828; margin:10px 0;"></p>
    <p style="font-size:0.9rem; color:#555; margin-bottom: 15px;">頸痛失能指數越低越好（0% 代表無症狀，100% 代表最嚴重失能）</p>
    
    <!-- 治療師提示聲明 -->
    <div class="notice-box">
      請不要離開此畫面，並將此頁面出示給您的治療師。您亦可以進行螢幕截圖（截圖留底），並將照片出示給您的治療師。謝謝。
    </div>
    
    <button type="button" class="close-btn" onclick="closeModal()">關閉</button>
  </div>
</div>

<script>
// 問卷題目資料
const questions = [
  { title: "1. 現在頸痛的程度", options: ["沒有頸痛", "溫和", "中等", "很厲害", "簡直不可想像"] },
  { title: "2. 頸痛與睡眠", options: ["頸痛從不干擾我睡眠", "頸痛有時會干擾我睡眠", "頸痛經常干擾我睡眠", "頸痛使我每晚睡眠少於五小時", "頸痛使我每晚睡眠少於二小時"] },
  { title: "3. 手臂在夜晚感到發麻或針刺", options: ["夜晚沒有麻痺或針刺感", "偶爾有麻痺或針刺感", "經常干擾睡眠", "使我每晚睡眠少於五小時", "使我每晚睡眠少於二小時"] },
  { title: "4. 每天症狀持續的時間", options: ["整天都正常", "起床後不適少於一小時", "不適持續 1–4 小時", "不適持續超過 4 小時", "整天持續不適"] },
  { title: "5. 攜帶物件", options: ["可攜帶重物而不痛", "可攜帶重物但會痛", "只能攜帶中等重量物件", "只能拿起輕物件", "甚麼都拿不起來"] },
  { title: "6. 閱讀及看電視", options: ["多久都可以，沒有困難", "姿勢適當時可持續", "可持續但會痛", "痛使我提早結束活動", "痛使我無法進行"] },
  { title: "7. 工作、家務之類", options: ["可做平時工作而不痛", "可做但會痛", "只能做一半工作量", "只能做四分之一工作量", "無法工作"] },
  { title: "8. 社交活動", options: ["社交正常，無痛", "社交正常但會痛", "受限但仍可外出", "只能在家社交", "無社交生活"] },
  { title: "9. 駕駛（可略過）", options: ["可駕駛，無不適", "可駕駛但有不適", "偶爾受限", "經常受限", "無法駕駛"], optional: true }
];

const questionsDiv = document.getElementById("questions");

// 動態渲染問卷內容
questions.forEach((q, index) => {
  const qNum = index + 1;
  const fieldset = document.createElement("fieldset");
  fieldset.className = "question";

  const legend = document.createElement("legend");
  legend.className = "question-title";
  legend.textContent = q.title;
  fieldset.appendChild(legend);

  if (q.optional) {
    const hint = document.createElement("div");
    hint.className = "hint";
    hint.textContent = "（若平常不駕駛，此題可不填寫）";
    fieldset.appendChild(hint);
  }

  const optionsDiv = document.createElement("div");
  optionsDiv.className = "options";

  q.options.forEach((opt, i) => {
    const label = document.createElement("label");
    label.className = "option";

    const input = document.createElement("input");
    input.type = "radio";
    input.name = `q${qNum}`;
    input.value = i;

    label.appendChild(input);
    label.appendChild(document.createTextNode(opt));
    optionsDiv.appendChild(label);
  });

  fieldset.appendChild(optionsDiv);
  questionsDiv.appendChild(fieldset);
});

// 計算分數核心邏輯
function calculateNPQ() {
  const warning = document.getElementById("warning");
  warning.textContent = "";

  let totalScore = 0;
  let maxPossibleScore = 0;

  for (let i = 1; i <= 9; i++) {
    const selected = document.querySelector(`input[name="q${i}"]:checked`);
    const isOptional = questions[i-1].optional;
    
    if (!selected) {
      if (isOptional) {
        // 如果第9題沒有選，直接跳過，不增加分母（保持分母為 32）
        continue;
      } else {
        // 1-8題沒選，跳出錯誤阻擋計算
        warning.textContent = `請填寫第 ${i} 題後再進行計算。`;
        return;
      }
    }
    
    totalScore += parseInt(selected.value);
    maxPossibleScore += 4; // 每回答一題，總分池就加 4 分
  }

  // 精準計算失能指數百分比
  const percentage = Math.round((totalScore / maxPossibleScore) * 100);

  document.getElementById("rawScoreText").innerHTML = `原始總分：<strong>${totalScore}</strong> / ${maxPossibleScore}`;
  document.getElementById("percentScoreText").innerHTML = `頸痛失能指數：<strong>${percentage}%</strong>`;

  const modal = document.getElementById("scoreModal");
  modal.style.display = "block";
  modal.setAttribute("aria-hidden", "false");
}

function closeModal() {
  const modal = document.getElementById("scoreModal");
  modal.style.display = "none";
  modal.setAttribute("aria-hidden", "true");
}
</script>

</body>
</html>

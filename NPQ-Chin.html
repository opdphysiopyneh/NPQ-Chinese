<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>Northwick Park 頸痛問卷（NPQ）</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { font-family: "Noto Sans TC", "Microsoft JhengHei", sans-serif; background:#f5f5f5; margin:0; padding:16px; }
    .container { max-width:900px; margin:auto; background:#fff; padding:20px; border-radius:10px; box-shadow:0 2px 6px rgba(0,0,0,0.1); }
    h1 { text-align:center; margin-bottom:20px; }
    fieldset.question { margin-bottom:20px; padding:16px; border:1px solid #ddd; border-radius:8px; background:#fafafa; }
    legend.question-title { font-weight:bold; margin-bottom:8px; padding:0 6px; font-size:1.05rem; }
    .options { display:flex; flex-direction:column; gap:8px; padding-top:4px; }
    .option { display:flex; align-items:center; gap:8px; padding:10px 12px; border-radius:6px; background:#fff; border:1px solid #ccc; cursor:pointer; font-size:0.95rem; }
    .option input { cursor:pointer; width:16px; height:16px; margin:0; }
    button { margin-top:20px; padding:12px 20px; border:none; border-radius:6px; background:#1976d2; color:white; font-size:1rem; cursor:pointer; width:100%; max-width:200px; display:block; }
    button:hover { background:#125a9c; }
    .modal { display:none; position:fixed; z-index:1000; inset:0; background:rgba(0,0,0,0.4); }
    .modal-content { background:#fff; margin:15% auto; padding:24px; border-radius:10px; width:90%; max-width:420px; text-align:center; box-shadow:0 2px 8px rgba(0,0,0,0.3); }
    .close-btn { margin-top:20px; padding:10px 16px; background:#555; color:white; border:none; border-radius:6px; cursor:pointer; }
    .close-btn:hover { background:#333; }
    .warning { color:#c62828; margin-top:12px; font-size:0.95rem; font-weight:bold; }
    .hint { font-size:0.85rem; color:#666; margin-top:2px; margin-bottom:8px; font-weight:normal; }
    .notice-box { background: #e3f2fd; border-left: 4px solid #1976d2; padding: 12px; margin-top: 15px; text-align: left; font-size: 0.95rem; color: #0d47a1; border-radius: 4px; line-height: 1.5; }
  </style>
</head>
<body>

<div class="container">
  <h1>Northwick Park 頸痛問卷（NPQ）</h1>
  <p>請根據你今日的情況，在每一題中選擇最貼切的描述。<strong>（若平時不駕駛，第9題可留空）</strong></p>
  
  <div id="questions-form">
    <!-- Q1 -->
    <fieldset class="question">
      <legend class="question-title">1. 現在頸痛的程度</legend>
      <div class="options">
        <label class="option"><input type="radio" name="q1" value="0"> 沒有頸痛</label>
        <label class="option"><input type="radio" name="q1" value="1"> 溫和</label>
        <label class="option"><input type="radio" name="q1" value="2"> 中等</label>
        <label class="option"><input type="radio" name="q1" value="3"> 很厲害</label>
        <label class="option"><input type="radio" name="q1" value="4"> 簡直不可想像</label>
      </div>
    </fieldset>

    <!-- Q2 -->
    <fieldset class="question">
      <legend class="question-title">2. 頸痛與睡眠</legend>
      <div class="options">
        <label class="option"><input type="radio" name="q2" value="0"> 頸痛從不干擾我睡眠</label>
        <label class="option"><input type="radio" name="q2" value="1"> 頸痛有時會干擾我睡眠</label>
        <label class="option"><input type="radio" name="q2" value="2"> 頸痛經常干擾我睡眠</label>
        <label class="option"><input type="radio" name="q2" value="3"> 頸痛使我每晚睡眠少於五小時</label>
        <label class="option"><input type="radio" name="q2" value="4"> 頸痛使我每晚睡眠少於二小時</label>
      </div>
    </fieldset>

    <!-- Q3 -->
    <fieldset class="question">
      <legend class="question-title">3. 手臂在夜晚感到發麻或針刺</legend>
      <div class="options">
        <label class="option"><input type="radio" name="q3" value="0"> 夜晚沒有麻痺或針刺感</label>
        <label class="option"><input type="radio" name="q3" value="1"> 偶爾有麻痺或針刺感</label>
        <label class="option"><input type="radio" name="q3" value="2"> 經常干擾睡眠</label>
        <label class="option"><input type="radio" name="q3" value="3"> 使我每晚睡眠少於五小時</label>
        <label class="option"><input type="radio" name="q3" value="4"> 使我每晚睡眠少於二小時</label>
      </div>
    </fieldset>

    <!-- Q4 -->
    <fieldset class="question">
      <legend class="question-title">4. 每天症狀持續的時間</legend>
      <div class="options">
        <label class="option"><input type="radio" name="q4" value="0"> 整天都正常</label>
        <label class="option"><input type="radio" name="q4" value="1"> 起床後不適少於一小時</label>
        <label class="option"><input type="radio" name="q4" value="2"> 不適持續 1–4 小時</label>
        <label class="option"><input type="radio" name="q4" value="3"> 不適持續超過 4 小時</label>
        <label class="option"><input type="radio" name="q4" value="4"> 整天持續不適</label>
      </div>
    </fieldset>

    <!-- Q5 -->
    <fieldset class="question">
      <legend class="question-title">5. 攜帶物件</legend>
      <div class="options">
        <label class="option"><input type="radio" name="q5" value="0"> 可攜帶重物而不痛</label>
        <label class="option"><input type="radio" name="q5" value="1"> 可攜帶重物但會痛</label>
        <label class="option"><input type="radio" name="q5" value="2"> 只能攜帶中等重量物件</label>
        <label class="option"><input type="radio" name="q5" value="3"> 只能拿起輕物件</label>
        <label class="option"><input type="radio" name="q5" value="4"> 甚麼都拿不起來</label>
      </div>
    </fieldset>

    <!-- Q6 -->
    <fieldset class="question">
      <legend class="question-title">6. 閱讀及看電視</legend>
      <div class="options">
        <label class="option"><input type="radio" name="q6" value="0"> 多久都可以，沒有困難</label>
        <label class="option"><input type="radio" name="q6" value="1"> 姿勢適當時可持續</label>
        <label class="option"><input type="radio" name="q6" value="2"> 可持續但會痛</label>
        <label class="option"><input type="radio" name="q6" value="3"> 痛使我提早結束活動</label>
        <label class="option"><input type="radio" name="q6" value="4"> 痛使我無法進行</label>
      </div>
    </fieldset>

    <!-- Q7 -->
    <fieldset class="question">
      <legend class="question-title">7. 工作、家務之類</legend>
      <div class="options">
        <label class="option"><input type="radio" name="q7" value="0"> 可做平時工作而不痛</label>
        <label class="option"><input type="radio" name="q7" value="1"> 可做但會痛</label>
        <label class="option"><input type="radio" name="q7" value="2"> 只能做一半工作量</label>
        <label class="option"><input type="radio" name="q7" value="3"> 只能做四分之一工作量</label>
        <label class="option"><input type="radio" name="q7" value="4"> 無法工作</label>
      </div>
    </fieldset>

    <!-- Q8 -->
    <fieldset class="question">
      <legend class="question-title">8. 社交活動</legend>
      <div class="options">
        <label class="option"><input type="radio" name="q8" value="0"> 社交正常，無痛</label>
        <label class="option"><input type="radio" name="q8" value="1"> 社交正常但會痛</label>
        <label class="option"><input type="radio" name="q8" value="2"> 受限但仍可外出</label>
        <label class="option"><input type="radio" name="q8" value="3"> 只能在家社交</label>
        <label class="option"><input type="radio" name="q8" value="4"> 無社交生活</label>
      </div>
    </fieldset>

    <!-- Q9 (Optional) -->
    <fieldset class="question">
      <legend class="question-title">9. 駕駛（可略過）</legend>
      <div class="hint">（若不駕駛，此題可不填）</div>
      <div class="options">
        <label class="option"><input type="radio" name="q9" value="0"> 可駕駛，無不適</label>
        <label class="option"><input type="radio" name="q9" value="1"> 可駕駛但有不適</label>
        <label class="option"><input type="radio" name="q9" value="2"> 偶爾受限</label>
        <label class="option"><input type="radio" name="q9" value="3"> 經常受限</label>
        <label class="option"><input type="radio" name="q9" value="4"> 無法駕駛</label>
      </div>
    </fieldset>
  </div>

  <button type="button" onclick="calculateNPQ()">計算分數</button>
  <div id="warning" class="warning" aria-live="assertive"></div>
</div>

<div id="scoreModal" class="modal" role="dialog" aria-labelledby="modalTitle" aria-hidden="true">
  <div class="modal-content">
    <h2 id="modalTitle">評估結果</h2>
    <p id="rawScoreText"></p>
    <p id="percentScoreText"></p>
    <p style="font-size:0.9rem; color:#555;">頸痛失能指數越低越好（0% 代表無症狀，100% 代表最嚴重失能）</p>

    <div class="notice-box">
      請不要離開此畫面，並將此頁面出示給您的治療師。
      您亦可以進行螢幕截圖，並將照片出示給您的治療師。謝謝。
    </div>
    
    <button type="button" class="close-btn" onclick="closeModal()">關閉</button>
  </div>
</div>

<script>
function calculateNPQ() {
  var warning = document.getElementById("warning");
  warning.textContent = "";

  var totalScore = 0;
  var maxPossibleScore = 0;

  // Check Q1 to Q8
  for (var i = 1; i <= 8; i++) {
    var checkedOpt = document.querySelector('input[name="q' + i + '"]:checked');
    if (!checkedOpt) {
      warning.textContent = "請填寫第 " + i + " 題後再進行計算。";
      return;
    }
    totalScore += parseInt(checkedOpt.value, 10);
    maxPossibleScore += 4;
  }

  // Check Q9 separately since it's optional
  var q9Checked = document.querySelector('input[name="q9"]:checked');
  if (q9Checked) {
    totalScore += parseInt(q9Checked.value, 10);
    maxPossibleScore += 4; // Becomes 36 total max pool
  }

  var percentage = Math.round((totalScore / maxPossibleScore) * 100);

  document.getElementById("rawScoreText").innerHTML = "原始總分：<strong>" + totalScore + "</strong> / " + maxPossibleScore;
  document.getElementById("percentScoreText").innerHTML = "頸痛失能指數：<strong>" + percentage + "%</strong>";

  var modal = document.getElementById("scoreModal");
  modal.style.display = "block";
  modal.setAttribute("aria-hidden", "false");
}

function closeModal() {
  var modal = document.getElementById("scoreModal");
  modal.style.display = "none";
  modal.setAttribute("aria-hidden", "true");
}
</script>

</body>
</html>
